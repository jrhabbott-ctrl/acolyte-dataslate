<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVENTORY</title>
<script src="cs_shared.js"></script>
<style>

/* ── FILTER BAR ── */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 6px 0;
  align-items: center;
  border-bottom: 1px solid var(--green-dark);
  margin-bottom: 8px;
}
.filter-btn {
  font-family: 'VT323', monospace;
  font-size: 15px;
  padding: 3px 10px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--green-dim);
  cursor: pointer;
  letter-spacing: 1px;
  transition: color 0.1s, border-color 0.1s;
  white-space: nowrap;
}
.filter-btn:hover  { color: var(--green); border-bottom-color: var(--green-mid); }
.filter-btn.active { color: var(--green-bright); border-bottom-color: var(--green); }
.filter-search {
  margin-left: auto;
  max-width: 160px;
  font-size: 12px;
  padding: 3px 6px;
}

/* ── ARMOURY TABLE ── */
.armoury-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
  font-family: 'Share Tech Mono', monospace;
}
.armoury-table th {
  font-family: 'VT323', monospace;
  font-size: 12px;
  color: var(--green-dim);
  text-align: left;
  padding: 3px 5px;
  border-bottom: 1px solid var(--green-mid);
  background: var(--green-dark);
  letter-spacing: 1px;
  white-space: nowrap;
}
/* ADD column header — left-most, narrow */
.armoury-table th.th-add {
  width: 52px;
  text-align: center;
  padding: 3px 4px;
}
.armoury-table td {
  padding: 3px 5px;
  border-bottom: 1px solid var(--green-dark);
  color: var(--green);
  vertical-align: middle;
}
.armoury-table tr:hover td { background: var(--green-faint); }
.armoury-table .td-name {
  font-family: 'VT323', monospace;
  font-size: 14px;
  color: var(--green-bright);
  white-space: nowrap;
}
.armoury-table .td-traits {
  font-size: 10px;
  color: var(--green-dim);
  max-width: 200px;
}
.armoury-table .td-avail { font-size: 10px; white-space: nowrap; }
.avail-common  { color: var(--green); }
.avail-scarce  { color: var(--amber); }
.avail-rare    { color: var(--amber-dim); }
.avail-exotic  { color: var(--red-dim); }

/* ADD button — compact, left column */
.add-item-btn {
  font-family: 'VT323', monospace;
  font-size: 14px;
  padding: 2px 7px;
  background: var(--green-dark);
  border: 1px solid var(--green-mid);
  color: var(--green-dim);
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.1s, border-color 0.1s, background 0.1s;
  display: block;
  width: 100%;
  text-align: center;
  letter-spacing: 1px;
}
.add-item-btn:hover {
  color: var(--green-bright);
  border-color: var(--green);
  background: var(--green-mid);
}

.category-divider td {
  font-family: 'VT323', monospace;
  font-size: 12px;
  color: var(--amber-dim);
  background: var(--green-dark) !important;
  padding: 2px 5px;
  letter-spacing: 2px;
}

/* ── ARMOUR GRID ── */
.armour-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.armour-loc {
  text-align: center;
  border: 1px solid var(--green-mid);
  background: var(--black);
  padding: 6px;
}
.armour-loc label { font-size: 10px; text-align: center; }
.armour-loc input { text-align: center; font-size: 20px; font-family: 'VT323', monospace; }

/* ── WEAPONS TABLE ── */
.weapons-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}
.weapons-table th {
  font-family: 'VT323', monospace;
  font-size: 12px;
  color: var(--green-dim);
  text-align: left;
  padding: 3px 5px;
  border-bottom: 1px solid var(--green-mid);
  background: var(--green-dark);
  letter-spacing: 1px;
  white-space: nowrap;
}
.weapons-table td {
  padding: 3px 4px;
  border-bottom: 1px solid var(--green-dark);
}
.weapons-table td input {
  background: transparent; border: none;
  border-bottom: 1px solid var(--green-dark);
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  width: 100%; padding: 1px; outline: none;
}
.weapons-table td input:focus { border-bottom-color: var(--green); }
.weapons-table tr:hover td { background: var(--green-faint); }

/* ── SOLARS BAR ── */
.solars-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 10px;
  background: var(--green-dark);
  border: 1px solid var(--green-mid);
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.solars-label { font-family: 'VT323', monospace; font-size: 16px; color: var(--green-dim); letter-spacing: 2px; }
.solars-input {
  width: 100px;
  font-family: 'VT323', monospace; font-size: 22px; text-align: center;
  background: var(--black); border: 1px solid var(--green-mid); color: var(--green-bright);
  padding: 2px 6px; outline: none;
}
.solars-input:focus { border-color: var(--green); }

/* ── REFERENCE DRAWER ── */
.ref-drawer-divider {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 20px;
  padding: 10px 14px;
  background: var(--green-dark);
  border: 1px solid var(--green-mid);
  border-bottom: none;
  cursor: pointer;
  font-family: 'VT323', monospace;
  font-size: 17px;
  color: var(--green-dim);
  letter-spacing: 2px;
  user-select: none;
  transition: color 0.1s, background 0.1s;
}
.ref-drawer-divider:hover { color: var(--green-bright); background: var(--green-mid); }
.ref-drawer-icon { font-size: 13px; color: var(--green-dim); transition: transform 0.2s; }
.ref-drawer-icon.open { transform: rotate(180deg); color: var(--green); }
.ref-drawer {
  border: 1px solid var(--green-mid);
  border-top: 1px solid var(--green-dim);
  background: var(--green-faint);
  padding: 10px;
}

/* ── FLASH MESSAGE ── */
.flash-msg {
  display: none;
  padding: 4px 10px;
  background: var(--green-dark);
  border: 1px solid var(--green);
  color: var(--green-bright);
  font-family: 'VT323', monospace;
  font-size: 14px;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.flash-msg.visible { display: block; }

/* ── ADD ITEM MODAL ── */
.add-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.add-modal-overlay.open { display: flex; }

.add-modal {
  background: var(--black);
  border: 1px solid var(--green);
  max-width: 520px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 0 30px rgba(0,255,65,0.12);
}

.add-modal-header {
  font-family: 'VT323', monospace;
  font-size: 18px;
  letter-spacing: 2px;
  padding: 8px 14px;
  background: var(--green-dark);
  border-bottom: 1px solid var(--green-mid);
  color: var(--green-bright);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.add-modal-close {
  background: none; border: none;
  color: var(--green-dark); cursor: pointer;
  font-size: 16px; font-family: 'VT323', monospace;
  transition: color 0.1s;
}
.add-modal-close:hover { color: var(--red); }

.add-modal-body { padding: 14px; }

/* Item preview card inside modal */
.item-preview {
  border: 1px solid var(--green-mid);
  background: var(--green-faint);
  padding: 10px 12px;
  margin-bottom: 12px;
}
.item-preview-name {
  font-family: 'VT323', monospace;
  font-size: 20px;
  color: var(--green-bright);
  letter-spacing: 2px;
  margin-bottom: 6px;
}
.item-preview-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px 16px;
  font-size: 10px;
  color: var(--green-dim);
}
.item-preview-grid span { color: var(--green); }
.item-preview-traits {
  font-size: 10px;
  color: var(--green-dim);
  margin-top: 6px;
  border-top: 1px solid var(--green-dark);
  padding-top: 5px;
  line-height: 1.5;
}

/* Destination selector */
.dest-label {
  font-size: 10px;
  color: var(--green-dim);
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.dest-btns {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.dest-btn {
  font-family: 'VT323', monospace;
  font-size: 14px;
  padding: 4px 12px;
  background: none;
  border: 1px solid var(--green-dark);
  color: var(--green-dim);
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.1s;
}
.dest-btn.selected {
  border-color: var(--green);
  color: var(--green-bright);
  background: var(--green-dark);
}
.dest-btn:hover:not(.selected) { border-color: var(--green-mid); color: var(--green); }

/* Confirm add button */
.confirm-add-btn {
  font-family: 'VT323', monospace;
  font-size: 16px;
  width: 100%;
  padding: 8px;
  background: var(--green-dark);
  border: 1px solid var(--green);
  color: var(--green-bright);
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.1s;
}
.confirm-add-btn:hover { background: var(--green-mid); }
.confirm-add-btn:disabled { opacity: 0.35; cursor: not-allowed; }

</style>
</head>
<body>
<div class="sheet-container">

  <!-- SOLARS -->
  <div class="solars-bar">
    <span class="solars-label">SOLARS:</span>
    <input class="solars-input" type="number" id="v-solars" min="0"
      oninput="saveVital('solars',this.value)">
    <span style="font-size:10px;color:var(--green-dim);">&#8212; currency carried</span>
  </div>

  <!-- PLAYER LOADOUT -->
  <div class="sheet-grid">

    <!-- ARMOUR LOCATIONS -->
    <div class="panel">
      <div class="panel-header">// ARMOUR</div>
      <div class="panel-body">
        <div class="armour-grid">
          <div class="armour-loc"><label>HEAD</label><input type="number" id="arm-head" min="0" oninput="saveArmour('head',this.value)"></div>
          <div class="armour-loc"><label>BODY</label><input type="number" id="arm-body" min="0" oninput="saveArmour('body',this.value)"></div>
          <div class="armour-loc"><label>L ARM</label><input type="number" id="arm-larm" min="0" oninput="saveArmour('larm',this.value)"></div>
          <div class="armour-loc"><label>R ARM</label><input type="number" id="arm-rarm" min="0" oninput="saveArmour('rarm',this.value)"></div>
          <div class="armour-loc"><label>L LEG</label><input type="number" id="arm-lleg" min="0" oninput="saveArmour('lleg',this.value)"></div>
          <div class="armour-loc"><label>R LEG</label><input type="number" id="arm-rleg" min="0" oninput="saveArmour('rleg',this.value)"></div>
        </div>
      </div>
    </div>

    <!-- EQUIPMENT -->
    <div class="panel">
      <div class="panel-header">// EQUIPMENT</div>
      <div class="panel-body">
        <div id="equip-list"></div>
        <button class="add-row-btn" onclick="addEquip()">+ ADD ITEM</button>
      </div>
    </div>

    <!-- WEAPONS -->
    <div class="panel sheet-full">
      <div class="panel-header">// WEAPONS</div>
      <div class="panel-body">
        <div style="overflow-x:auto;">
          <table class="weapons-table">
            <thead>
              <tr><th>NAME</th><th>TYPE</th><th>DMG</th><th>RANGE</th><th>MAG</th><th>ENC</th><th>AP/TRAITS</th><th>NOTES</th><th></th></tr>
            </thead>
            <tbody id="weapons-body"></tbody>
          </table>
        </div>
        <button class="add-row-btn" onclick="addWeapon()">+ ADD WEAPON</button>
      </div>
    </div>

    <!-- AUGMETICS -->
    <div class="panel sheet-full">
      <div class="panel-header">// AUGMETICS</div>
      <div class="panel-body">
        <div id="augmetic-list"></div>
        <button class="add-row-btn" onclick="addAugmetic()">+ ADD AUGMETIC</button>
      </div>
    </div>

  </div><!-- /sheet-grid -->

  <!-- ARMOURY REFERENCE DRAWER -->
  <div class="ref-drawer-divider" onclick="toggleArmouryRef()">
    <span class="ref-drawer-icon" id="armoury-ref-icon">&#9660;</span>
    <span>ARMOURY REFERENCE &amp; ADD TO LOADOUT</span>
    <span style="font-size:10px;color:var(--green-dim);margin-left:8px;">&#8212; click to expand</span>
  </div>

  <div class="ref-drawer" id="armoury-ref-drawer" style="display:none;">
    <div class="flash-msg" id="flash-msg"></div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('ALL',this)">ALL</button>
      <button class="filter-btn" onclick="setFilter('MELEE',this)">MELEE</button>
      <button class="filter-btn" onclick="setFilter('RANGED',this)">RANGED</button>
      <button class="filter-btn" onclick="setFilter('GRENADES',this)">GRENADES</button>
      <button class="filter-btn" onclick="setFilter('ARMOUR',this)">ARMOUR</button>
      <button class="filter-btn" onclick="setFilter('AUGMETICS',this)">AUGMETICS</button>
      <button class="filter-btn" onclick="setFilter('GEAR',this)">GEAR</button>
      <input type="text" class="filter-search" id="armoury-search"
        placeholder="Search..." oninput="renderArmoury()">
    </div>
    <div style="overflow-x:auto;">
      <table class="armoury-table">
        <thead id="armoury-thead"></thead>
        <tbody id="armoury-tbody"></tbody>
      </table>
    </div>
  </div>

</div><!-- /sheet-container -->

<!-- ── ADD ITEM MODAL ── -->
<div class="add-modal-overlay" id="add-modal-overlay">
  <div class="add-modal">
    <div class="add-modal-header">
      <span id="add-modal-title">ADD TO LOADOUT</span>
      <button class="add-modal-close" onclick="closeAddModal()">&#x2715;</button>
    </div>
    <div class="add-modal-body" id="add-modal-body"></div>
  </div>
</div>

// ── Drawer toggle ──────────────────────────────────────────

function toggleArmouryRef() {
  const drawer = document.getElementById('armoury-ref-drawer');
  const icon   = document.getElementById('armoury-ref-icon');
  const open   = drawer.style.display === 'none';
  drawer.style.display = open ? '' : 'none';
  icon.classList.toggle('open', open);
  if (open) renderArmoury();
}

// ── Filter state ───────────────────────────────────────────
let currentFilter = 'ALL';

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderArmoury();
}

function availClass(a) {
  if (!a) return '';
  const l = a.toLowerCase();
  if (l === 'common')   return 'avail-common';
  if (l === 'scarce')   return 'avail-scarce';
  if (l === 'rare')     return 'avail-rare';
  return 'avail-exotic';
}

// ── Render armoury table ───────────────────────────────────

function renderArmoury() {
  const search = (document.getElementById('armoury-search').value || '').toLowerCase();
  const tbody  = document.getElementById('armoury-tbody');
  tbody.innerHTML = '';

  const categories = currentFilter === 'ALL'
    ? ['MELEE','RANGED','GRENADES','ARMOUR','AUGMETICS','GEAR']
    : [currentFilter];

  categories.forEach(cat => {
    const items = (ARMOURY[cat] || []).filter(item =>
      !search || item.name.toLowerCase().includes(search)
    );
    if (!items.length) return;

    // Category divider
    const divRow = document.createElement('tr');
    divRow.className = 'category-divider';
    divRow.innerHTML = '<td colspan="10">' + cat + '</td>';
    tbody.appendChild(divRow);

    // Header row — ADD is first column
    const hdr = document.createElement('tr');
    let hdrHtml = '<th class="th-add">ADD</th>';
    if (cat === 'MELEE')     hdrHtml += '<th>NAME</th><th>SPEC</th><th>DAM</th><th>ENC</th><th>COST</th><th>AVAIL</th><th>TRAITS</th>';
    else if (cat === 'RANGED') hdrHtml += '<th>NAME</th><th>SPEC</th><th>DAM</th><th>RANGE</th><th>MAG</th><th>ENC</th><th>COST</th><th>AVAIL</th><th>TRAITS</th>';
    else if (cat === 'GRENADES') hdrHtml += '<th>NAME</th><th>SPEC</th><th>DAM</th><th>ENC</th><th>COST</th><th>AVAIL</th><th>TRAITS</th>';
    else if (cat === 'ARMOUR')   hdrHtml += '<th>NAME</th><th>LOCATIONS</th><th>AP</th><th>ENC</th><th>COST</th><th>AVAIL</th><th>TRAITS</th>';
    else if (cat === 'AUGMETICS') hdrHtml += '<th>NAME</th><th>COST</th><th>AVAIL</th><th>EFFECT</th>';
    else hdrHtml += '<th>NAME</th><th>COST</th><th>AVAIL</th><th>ENC</th><th>NOTES</th>';
    hdr.innerHTML = hdrHtml;
    tbody.appendChild(hdr);

    items.forEach(item => {
      const tr  = document.createElement('tr');
      const ac  = availClass(item.avail);
      // Serialise item safely for inline onclick
      const itemJson = JSON.stringify(item).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      const addCell = '<td style="width:52px;padding:3px 4px;"><button class="add-item-btn" onclick="openAddModal(\'' + cat + '\',\'' + itemJson + '\')">+ ADD</button></td>';

      let cells = '';
      if (cat === 'MELEE') {
        cells = '<td class="td-name">' + item.name + '</td>' +
          '<td>' + item.spec + '</td><td>' + item.dam + '</td><td>' + item.enc + '</td>' +
          '<td>' + item.cost + '</td><td class="td-avail ' + ac + '">' + item.avail + '</td>' +
          '<td class="td-traits">' + item.traits + '</td>';
      } else if (cat === 'RANGED') {
        cells = '<td class="td-name">' + item.name + '</td>' +
          '<td>' + item.spec + '</td><td>' + item.dam + '</td><td>' + item.range + '</td>' +
          '<td>' + item.mag + '</td><td>' + item.enc + '</td><td>' + item.cost + '</td>' +
          '<td class="td-avail ' + ac + '">' + item.avail + '</td>' +
          '<td class="td-traits">' + item.traits + '</td>';
      } else if (cat === 'GRENADES') {
        cells = '<td class="td-name">' + item.name + '</td>' +
          '<td>' + item.spec + '</td><td>' + item.dam + '</td><td>' + item.enc + '</td>' +
          '<td>' + item.cost + '</td><td class="td-avail ' + ac + '">' + item.avail + '</td>' +
          '<td class="td-traits">' + item.traits + '</td>';
      } else if (cat === 'ARMOUR') {
        cells = '<td class="td-name">' + item.name + '</td>' +
          '<td>' + item.locations + '</td><td>' + item.armour + '</td><td>' + item.enc + '</td>' +
          '<td>' + item.cost + '</td><td class="td-avail ' + ac + '">' + item.avail + '</td>' +
          '<td class="td-traits">' + item.traits + '</td>';
      } else if (cat === 'AUGMETICS') {
        cells = '<td class="td-name">' + item.name + '</td>' +
          '<td>' + item.cost + '</td><td class="td-avail ' + ac + '">' + item.avail + '</td>' +
          '<td class="td-traits">' + item.effect + '</td>';
      } else {
        cells = '<td class="td-name">' + item.name + '</td>' +
          '<td>' + item.cost + '</td><td class="td-avail ' + ac + '">' + item.avail + '</td>' +
          '<td>' + (item.enc !== undefined ? item.enc : '\u2014') + '</td>' +
          '<td class="td-traits">' + item.notes + '</td>';
      }
      tr.innerHTML = addCell + cells;
      tbody.appendChild(tr);
    });
  });
}

// ── Add Item Modal ─────────────────────────────────────────

let _pendingCat  = null;
let _pendingItem = null;
let _pendingDest = null; // for ARMOUR: 'equipment' or 'armour-values'

function openAddModal(cat, itemJson) {
  _pendingCat  = cat;
  _pendingItem = JSON.parse(itemJson.replace(/\\'/g,"'"));
  _pendingDest = null;

  const overlay = document.getElementById('add-modal-overlay');
  const title   = document.getElementById('add-modal-title');
  const body    = document.getElementById('add-modal-body');

  title.textContent = 'ADD TO LOADOUT — ' + cat;
  body.innerHTML = '';

  const item = _pendingItem;
  const ac   = availClass(item.avail);

  // ── Item preview card ──
  const preview = document.createElement('div');
  preview.className = 'item-preview';

  const nameEl = document.createElement('div');
  nameEl.className = 'item-preview-name';
  nameEl.textContent = item.name;
  preview.appendChild(nameEl);

  const grid = document.createElement('div');
  grid.className = 'item-preview-grid';

  if (cat === 'MELEE') {
    grid.innerHTML =
      '<div>SPEC <span>' + item.spec + '</span></div>' +
      '<div>DAMAGE <span>' + item.dam + '</span></div>' +
      '<div>ENC <span>' + item.enc + '</span></div>' +
      '<div>COST <span>' + item.cost + '</span></div>' +
      '<div>AVAIL <span class="' + ac + '">' + item.avail + '</span></div>';
  } else if (cat === 'RANGED') {
    grid.innerHTML =
      '<div>SPEC <span>' + item.spec + '</span></div>' +
      '<div>DAMAGE <span>' + item.dam + '</span></div>' +
      '<div>RANGE <span>' + item.range + '</span></div>' +
      '<div>MAG <span>' + item.mag + '</span></div>' +
      '<div>ENC <span>' + item.enc + '</span></div>' +
      '<div>COST <span>' + item.cost + '</span></div>' +
      '<div>AVAIL <span class="' + ac + '">' + item.avail + '</span></div>';
  } else if (cat === 'GRENADES') {
    grid.innerHTML =
      '<div>SPEC <span>' + item.spec + '</span></div>' +
      '<div>DAMAGE <span>' + item.dam + '</span></div>' +
      '<div>ENC <span>' + item.enc + '</span></div>' +
      '<div>COST <span>' + item.cost + '</span></div>' +
      '<div>AVAIL <span class="' + ac + '">' + item.avail + '</span></div>';
  } else if (cat === 'ARMOUR') {
    grid.innerHTML =
      '<div>LOCATIONS <span>' + item.locations + '</span></div>' +
      '<div>ARMOUR <span>' + item.armour + '</span></div>' +
      '<div>ENC <span>' + item.enc + '</span></div>' +
      '<div>COST <span>' + item.cost + '</span></div>' +
      '<div>AVAIL <span class="' + ac + '">' + item.avail + '</span></div>';
  } else if (cat === 'AUGMETICS') {
    grid.innerHTML =
      '<div>COST <span>' + item.cost + '</span></div>' +
      '<div>AVAIL <span class="' + ac + '">' + item.avail + '</span></div>';
  } else {
    grid.innerHTML =
      '<div>ENC <span>' + (item.enc !== undefined ? item.enc : '\u2014') + '</span></div>' +
      '<div>COST <span>' + item.cost + '</span></div>' +
      '<div>AVAIL <span class="' + ac + '">' + item.avail + '</span></div>';
  }
  preview.appendChild(grid);

  // Traits / effect / notes line
  const traitsText = item.traits || item.effect || item.notes || '';
  if (traitsText) {
    const traits = document.createElement('div');
    traits.className = 'item-preview-traits';
    traits.textContent = traitsText;
    preview.appendChild(traits);
  }
  body.appendChild(preview);

  // ── Destination selector (ARMOUR only gets a choice) ──
  if (cat === 'ARMOUR') {
    const dl = document.createElement('div');
    dl.className = 'dest-label';
    dl.textContent = 'ADD TO:';
    body.appendChild(dl);

    const dbtns = document.createElement('div');
    dbtns.className = 'dest-btns';

    const opt1 = document.createElement('button');
    opt1.className = 'dest-btn';
    opt1.textContent = 'EQUIPMENT LIST';
    opt1.onclick = () => {
      _pendingDest = 'equipment';
      document.querySelectorAll('.dest-btn').forEach(b => b.classList.remove('selected'));
      opt1.classList.add('selected');
      document.getElementById('confirm-add-btn').disabled = false;
    };

    const opt2 = document.createElement('button');
    opt2.className = 'dest-btn';
    opt2.textContent = 'ARMOUR VALUES';
    opt2.onclick = () => {
      _pendingDest = 'armour-values';
      document.querySelectorAll('.dest-btn').forEach(b => b.classList.remove('selected'));
      opt2.classList.add('selected');
      document.getElementById('confirm-add-btn').disabled = false;
    };

    dbtns.appendChild(opt1);
    dbtns.appendChild(opt2);
    body.appendChild(dbtns);

    const hint = document.createElement('div');
    hint.style.cssText = 'font-size:9px;color:var(--green-dark);margin-bottom:10px;letter-spacing:1px;';
    hint.textContent = 'EQUIPMENT LIST adds it as a text entry. ARMOUR VALUES fills in the armour rating by location.';
    body.appendChild(hint);
  }

  // ── Confirm button ──
  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'confirm-add-btn';
  confirmBtn.id = 'confirm-add-btn';
  confirmBtn.textContent = '+ CONFIRM ADD TO LOADOUT';
  // Armour requires dest selection first; everything else is ready immediately
  confirmBtn.disabled = (cat === 'ARMOUR');
  confirmBtn.onclick = () => commitAdd();
  body.appendChild(confirmBtn);

  overlay.classList.add('open');
}

function closeAddModal() {
  document.getElementById('add-modal-overlay').classList.remove('open');
  _pendingCat  = null;
  _pendingItem = null;
  _pendingDest = null;
}

// Close on backdrop click
document.getElementById('add-modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeAddModal();
});

function commitAdd() {
  const cat  = _pendingCat;
  const item = _pendingItem;
  const d    = currentData();
  let msg    = '';

  if (cat === 'MELEE') {
    if (!d.weapons) d.weapons = [];
    d.weapons.push({
      name: item.name, type: 'Melee/' + item.spec,
      damage: item.dam, range: 'Melee', clip: '\u2014',
      enc: String(item.enc), traits: item.traits, notes: ''
    });
    msg = item.name + ' added to WEAPONS';
    saveCurrentData(d); renderWeapons(d);

  } else if (cat === 'RANGED') {
    if (!d.weapons) d.weapons = [];
    d.weapons.push({
      name: item.name, type: 'Ranged/' + item.spec,
      damage: item.dam, range: item.range,
      clip: String(item.mag), enc: String(item.enc),
      traits: item.traits, notes: ''
    });
    msg = item.name + ' added to WEAPONS';
    saveCurrentData(d); renderWeapons(d);

  } else if (cat === 'GRENADES') {
    if (!d.weapons) d.weapons = [];
    d.weapons.push({
      name: item.name, type: 'Grenade/' + item.spec,
      damage: item.dam, range: 'Thrown', clip: '1',
      enc: String(item.enc), traits: item.traits, notes: ''
    });
    msg = item.name + ' added to WEAPONS';
    saveCurrentData(d); renderWeapons(d);

  } else if (cat === 'ARMOUR') {
    if (_pendingDest === 'armour-values') {
      // Parse locations and apply armour value
      const locs  = (item.locations || '').toLowerCase();
      const val   = typeof item.armour === 'number' ? item.armour : 0;
      if (!d.armour) d.armour = {};
      if (locs === 'all') {
        ['head','body','larm','rarm','lleg','rleg'].forEach(l => { d.armour[l] = val; });
      } else {
        if (locs.includes('head'))              d.armour.head = val;
        if (locs.includes('body'))              d.armour.body = val;
        if (locs.includes('arm') || locs.includes('arms')) { d.armour.larm = val; d.armour.rarm = val; }
        if (locs.includes('leg') || locs.includes('legs')) { d.armour.lleg = val; d.armour.rleg = val; }
      }
      saveCurrentData(d); loadArmour(d);
      msg = item.name + ' applied to ARMOUR VALUES';
    } else {
      if (!d.equipment) d.equipment = [];
      d.equipment.push(item.name + ' (AP ' + item.armour + ', ' + item.locations + ')');
      saveCurrentData(d); renderEquip(d);
      msg = item.name + ' added to EQUIPMENT';
    }

  } else if (cat === 'AUGMETICS') {
    if (!d.augmetics) d.augmetics = [];
    d.augmetics.push(item.name + ': ' + item.effect);
    saveCurrentData(d); renderAugmetics(d);
    msg = item.name + ' added to AUGMETICS';

  } else {
    // GEAR
    if (!d.equipment) d.equipment = [];
    d.equipment.push(item.name);
    saveCurrentData(d); renderEquip(d);
    msg = item.name + ' added to EQUIPMENT';
  }

  closeAddModal();
  flash(msg);
}

function flash(msg) {
  const el = document.getElementById('flash-msg');
  el.textContent = '+ ' + msg;
  el.classList.add('visible');
  clearTimeout(flash._t);
  flash._t = setTimeout(() => el.classList.remove('visible'), 2500);
}

// ── Weapons ────────────────────────────────────────────────

function renderWeapons(d) {
  const tbody = document.getElementById('weapons-body');
  tbody.innerHTML = '';
  (d.weapons || []).forEach((w, i) => {
    const tr = document.createElement('tr');
    ['name','type','damage','range','clip','enc','traits','notes'].forEach(f => {
      const td  = document.createElement('td');
      const inp = document.createElement('input');
      inp.type = 'text'; inp.value = w[f] || '';
      inp.oninput = () => updateWeapon(i, f, inp.value);
      td.appendChild(inp); tr.appendChild(td);
    });
    const td = document.createElement('td');
    const rm = document.createElement('button');
    rm.className = 'remove-btn'; rm.innerHTML = '&#x2715;';
    rm.onclick = () => removeWeapon(i);
    td.appendChild(rm); tr.appendChild(td);
    tbody.appendChild(tr);
  });
}

function addWeapon() {
  const d = currentData();
  if (!d.weapons) d.weapons = [];
  d.weapons.push({ name:'', type:'', damage:'', range:'', clip:'', enc:'', traits:'', notes:'' });
  saveCurrentData(d); renderWeapons(d);
}

function removeWeapon(i) {
  const d = currentData();
  d.weapons.splice(i, 1);
  saveCurrentData(d); renderWeapons(d);
}

function updateWeapon(i, field, val) {
  const d = currentData();
  d.weapons[i][field] = val;
  saveCurrentData(d);
}

// ── Equipment & Augmetics ──────────────────────────────────

function renderEquip(d)     { renderSimpleList('equip-list',    d.equipment || [], 'equip'); }
function renderAugmetics(d) { renderSimpleList('augmetic-list', d.augmetics || [], 'augmetic'); }

function renderSimpleList(containerId, items, type) {
  const list = document.getElementById(containerId);
  list.innerHTML = '';
  items.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'list-item';
    const inp = document.createElement('input');
    inp.type = 'text'; inp.value = item || ''; inp.placeholder = 'Item...';
    inp.oninput = () => updateSimpleItem(type, i, inp.value);
    const rm = document.createElement('button');
    rm.className = 'remove-btn'; rm.innerHTML = '&#x2715;';
    rm.onclick = () => removeSimpleItem(type, i);
    div.appendChild(inp); div.appendChild(rm);
    list.appendChild(div);
  });
}

function addEquip()    { addSimpleItem('equip'); }
function addAugmetic() { addSimpleItem('augmetic'); }

function addSimpleItem(type) {
  const d   = currentData();
  const key = type === 'equip' ? 'equipment' : 'augmetics';
  if (!d[key]) d[key] = [];
  d[key].push('');
  saveCurrentData(d);
  if (type === 'equip') renderEquip(d); else renderAugmetics(d);
}

function removeSimpleItem(type, i) {
  const d   = currentData();
  const key = type === 'equip' ? 'equipment' : 'augmetics';
  d[key].splice(i, 1);
  saveCurrentData(d);
  if (type === 'equip') renderEquip(d); else renderAugmetics(d);
}

function updateSimpleItem(type, i, val) {
  const d   = currentData();
  const key = type === 'equip' ? 'equipment' : 'augmetics';
  d[key][i] = val;
  saveCurrentData(d);
}

// ── Armour ─────────────────────────────────────────────────

function loadArmour(d) {
  ['head','body','larm','rarm','lleg','rleg'].forEach(loc => {
    setVal('arm-' + loc, (d.armour || {})[loc] || 0);
  });
}

// ── Init ───────────────────────────────────────────────────

function init() {
  const d = currentData();
  setVal('v-solars', d.vitals?.solars ?? 0);
  loadArmour(d);
  renderWeapons(d);
  renderEquip(d);
  renderAugmetics(d);
}

window.refreshIfPresent = init;
init();

</script>
</body>
</html>
