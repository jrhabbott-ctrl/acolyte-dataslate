<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVENTORY</title>
<script src="cs_shared.js"></script>
<style>
.armour-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:8px; }
.armour-loc { text-align:center; border:1px solid var(--green-mid); background:var(--black); padding:6px; }
.armour-loc label { font-size:10px; display:block; margin-bottom:2px; color:var(--green-dim); letter-spacing:1px; }
.armour-loc input { text-align:center; font-size:20px; font-family:'VT323',monospace; }
.weapons-table { width:100%; border-collapse:collapse; font-size:11px; }
.weapons-table th { font-family:'VT323',monospace; font-size:12px; color:var(--green-dim); text-align:left; padding:3px 5px; border-bottom:1px solid var(--green-mid); background:var(--green-dark); letter-spacing:1px; white-space:nowrap; }
.weapons-table td { padding:3px 4px; border-bottom:1px solid var(--green-dark); }
.weapons-table td input { background:transparent; border:none; border-bottom:1px solid var(--green-dark); color:var(--green); font-family:'Share Tech Mono',monospace; font-size:11px; width:100%; padding:1px; outline:none; }
.weapons-table td input:focus { border-bottom-color:var(--green); }
.weapons-table tr:hover td { background:var(--green-faint); }
.solars-bar { display:flex; align-items:center; gap:10px; padding:6px 10px; background:var(--green-dark); border:1px solid var(--green-mid); margin-bottom:10px; flex-wrap:wrap; }
.solars-label { font-family:'VT323',monospace; font-size:16px; color:var(--green-dim); letter-spacing:2px; }
.solars-input { width:100px; font-family:'VT323',monospace; font-size:22px; text-align:center; background:var(--black); border:1px solid var(--green-mid); color:var(--green-bright); padding:2px 6px; outline:none; }
.solars-input:focus { border-color:var(--green); }
.panel-flash { font-family:'VT323',monospace; font-size:13px; color:var(--green-bright); letter-spacing:1px; padding:3px 8px; border:1px solid var(--green-mid); background:var(--green-dark); margin-bottom:6px; display:none; }
.panel-flash.visible { display:block; }
.armoury-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.90); z-index:2000; align-items:flex-start; justify-content:center; padding:16px 12px; overflow-y:auto; }
.armoury-overlay.open { display:flex; }
.armoury-modal { background:var(--black); border:1px solid var(--green); width:100%; max-width:680px; margin:auto; box-shadow:0 0 30px rgba(0,255,65,0.10); }
.armoury-modal-header { font-family:'VT323',monospace; font-size:20px; letter-spacing:3px; padding:10px 14px; background:var(--green-dark); border-bottom:1px solid var(--green-mid); color:var(--green-bright); display:flex; justify-content:space-between; align-items:center; }
.armoury-modal-close { background:none; border:none; color:var(--green-dark); cursor:pointer; font-size:18px; font-family:'VT323',monospace; padding:0 4px; transition:color 0.1s; line-height:1; }
.armoury-modal-close:hover { color:var(--red); }
.armoury-modal-hint { font-size:10px; color:var(--green-dim); padding:5px 14px; border-bottom:1px solid var(--green-dark); letter-spacing:1px; }
.armour-dest-row { display:flex; gap:8px; padding:7px 14px; border-bottom:1px solid var(--green-dark); background:var(--green-faint); align-items:center; flex-wrap:wrap; }
.armour-dest-label { font-size:10px; color:var(--green-dim); letter-spacing:1px; flex-shrink:0; }
.armour-dest-btn { font-family:'VT323',monospace; font-size:13px; padding:3px 10px; background:none; border:1px solid var(--green-dark); color:var(--green-dim); cursor:pointer; letter-spacing:1px; transition:all 0.1s; }
.armour-dest-btn.selected { border-color:var(--green); color:var(--green-bright); background:var(--green-dark); }
.armour-dest-btn:hover:not(.selected) { border-color:var(--green-mid); color:var(--green); }
.armoury-search-bar { padding:6px 14px; border-bottom:1px solid var(--green-dark); background:var(--green-faint); }
.armoury-search-inp { width:100%; background:var(--black); border:1px solid var(--green-mid); color:var(--green); font-family:'Share Tech Mono',monospace; font-size:12px; padding:5px 8px; outline:none; }
.armoury-search-inp:focus { border-color:var(--green); }
.armoury-search-inp::placeholder { color:var(--green-dark); }
.armoury-item-list { max-height:58vh; overflow-y:auto; }
.armoury-subcat { font-family:'VT323',monospace; font-size:12px; color:var(--amber-dim); background:var(--green-dark); padding:3px 14px; letter-spacing:2px; border-bottom:1px solid var(--green-dark); }
.armoury-item-row { display:flex; align-items:flex-start; gap:10px; padding:8px 14px; border-bottom:1px solid var(--green-dark); cursor:pointer; transition:background 0.1s; }
.armoury-item-row:hover { background:var(--green-faint); }
.armoury-item-row:active { background:var(--green-dark); }
.armoury-item-row:last-child { border-bottom:none; }
.item-row-name { font-family:'VT323',monospace; font-size:16px; color:var(--green-bright); letter-spacing:1px; min-width:150px; flex-shrink:0; line-height:1.2; }
.item-row-stats { font-size:10px; color:var(--green-dim); line-height:1.6; flex:1; }
.item-row-stats b { color:var(--green); font-weight:normal; }
.item-cost-ref { color:var(--green-dark); font-size:9px; }
.item-row-avail { font-size:10px; white-space:nowrap; align-self:center; padding:1px 6px; border:1px solid; letter-spacing:1px; flex-shrink:0; }
.avail-common  { color:var(--green);     border-color:var(--green-mid); }
.avail-scarce  { color:var(--amber);     border-color:var(--amber-dim); }
.avail-rare    { color:var(--amber-dim); border-color:var(--amber-dim); }
.avail-exotic  { color:var(--red-dim);   border-color:var(--red-dim); }
</style>
</head>
<body>
<div class="sheet-container">
  <div class="solars-bar">
    <span class="solars-label">SOLARS:</span>
    <input class="solars-input" type="number" id="v-solars" min="0" oninput="saveVital('solars',this.value)">
    <span style="font-size:10px;color:var(--green-dim);">&#8212; currency carried</span>
  </div>
  <div class="sheet-grid">
    <div class="panel">
      <div class="panel-header">// ARMOUR</div>
      <div class="panel-body">
        <div class="panel-flash" id="flash-armour"></div>
        <div class="armour-grid">
          <div class="armour-loc"><label>HEAD</label>  <input type="number" id="arm-head" min="0" oninput="saveArmour('head',this.value)"></div>
          <div class="armour-loc"><label>BODY</label>  <input type="number" id="arm-body" min="0" oninput="saveArmour('body',this.value)"></div>
          <div class="armour-loc"><label>L ARM</label> <input type="number" id="arm-larm" min="0" oninput="saveArmour('larm',this.value)"></div>
          <div class="armour-loc"><label>R ARM</label> <input type="number" id="arm-rarm" min="0" oninput="saveArmour('rarm',this.value)"></div>
          <div class="armour-loc"><label>L LEG</label> <input type="number" id="arm-lleg" min="0" oninput="saveArmour('lleg',this.value)"></div>
          <div class="armour-loc"><label>R LEG</label> <input type="number" id="arm-rleg" min="0" oninput="saveArmour('rleg',this.value)"></div>
        </div>
        <button class="add-row-btn" onclick="openArmoury('ARMOUR')">+ ADD ARMOUR</button>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">// EQUIPMENT</div>
      <div class="panel-body">
        <div class="panel-flash" id="flash-equip"></div>
        <div id="equip-list"></div>
        <button class="add-row-btn" onclick="openArmoury('GEAR')">+ ADD EQUIPMENT</button>
      </div>
    </div>
    <div class="panel sheet-full">
      <div class="panel-header">// WEAPONS</div>
      <div class="panel-body">
        <div class="panel-flash" id="flash-weapons"></div>
        <div style="overflow-x:auto;">
          <table class="weapons-table">
            <thead><tr><th>NAME</th><th>TYPE</th><th>DMG</th><th>RANGE</th><th>MAG</th><th>ENC</th><th>AP/TRAITS</th><th>NOTES</th><th></th></tr></thead>
            <tbody id="weapons-body"></tbody>
          </table>
        </div>
        <button class="add-row-btn" onclick="openArmoury('WEAPONS')">+ ADD WEAPON</button>
      </div>
    </div>
    <div class="panel sheet-full">
      <div class="panel-header">// AUGMETICS</div>
      <div class="panel-body">
        <div class="panel-flash" id="flash-aug"></div>
        <div id="augmetic-list"></div>
        <button class="add-row-btn" onclick="openArmoury('AUGMETICS')">+ ADD AUGMETIC</button>
      </div>
    </div>
  </div>
</div>

<div class="armoury-overlay" id="armoury-overlay">
  <div class="armoury-modal">
    <div class="armoury-modal-header">
      <span id="armoury-title">ARMOURY</span>
      <button class="armoury-modal-close" onclick="closeArmoury()">&#x2715;</button>
    </div>
    <div class="armoury-modal-hint">Tap an item to add it to your loadout. Cost shown for reference only — no Solars deducted.</div>
    <div class="armour-dest-row" id="armour-dest-row" style="display:none;">
      <span class="armour-dest-label">ADD TO:</span>
      <button class="armour-dest-btn selected" id="dest-list"   onclick="setDest('list',this)">EQUIPMENT LIST</button>
      <button class="armour-dest-btn"           id="dest-values" onclick="setDest('values',this)">ARMOUR VALUES</button>
    </div>
    <div class="armoury-search-bar">
      <input class="armoury-search-inp" id="armoury-search" type="text" placeholder="Search..." oninput="renderList()">
    </div>
    <div class="armoury-item-list" id="armoury-item-list"></div>
  </div>
</div>

 only."},{name:"Manipulator Mechadendrite",cost:1400,avail:"Rare",effect:"+2 SL Strength; -1 SL Dexterity; Improvised Melee. AdMech only."},{name:"Medicae Mechadendrite",cost:1400,avail:"Rare",effect:"Counts as Chirurgeon's Kit; unlimited uses. AdMech only."},{name:"Mind Impulse Unit",cost:10000,avail:"Rare",effect:"Interface with machines directly. AdMech only."},{name:"Optical Mechadendrite",cost:1200,avail:"Rare",effect:"+1 SL Awareness (Sight); ignores Dark Zones. AdMech only."},{name:"Utility Mechadendrite",cost:1000,avail:"Rare",effect:"+2 SL Tech Tests; Combi-Tool; Improvised Melee. AdMech only."},{name:"Vocal Implant",cost:400,avail:"Rare",effect:"Voice/sounds audible up to 100m. AdMech only."}],GEAR:[{name:"Auspex/Scanner",cost:1000,avail:"Scarce",enc:1,notes:"Detects motion, energy, life signs within Medium Range"},{name:"Auto-Quill",cost:150,avail:"Scarce",enc:2,notes:"Transcribes spoken word or copies written text"},{name:"Backpack/Slings",cost:20,avail:"Common",enc:1,notes:"+4 max Encumbrance when worn"},{name:"Cameleoline Cloak",cost:500,avail:"Rare",enc:0,notes:"+2 SL Stealth Tests while stationary"},{name:"Chirurgeon's Kit",cost:500,avail:"Rare",enc:1,notes:"5 uses. Required for Critical Wounds/Injuries"},{name:"Chrono",cost:20,avail:"Common",enc:0,notes:"Displays/auto-syncs local time"},{name:"Climbing Harness",cost:100,avail:"Common",enc:0,notes:"50m rope; auto-arrests falls"},{name:"Combi-Tool",cost:300,avail:"Rare",enc:0,notes:"Required for augmetic repair"},{name:"Comm Leech",cost:1000,avail:"Rare",enc:1,notes:"Intercept vox signals up to 3km"},{name:"Dataslate",cost:100,avail:"Common",enc:0,notes:"Stores text, picts, vids. Biometric lock."},{name:"Diagnostor",cost:2000,avail:"Rare",enc:1,notes:"Medicae Tests to detect illness"},{name:"Disguise Kit",cost:100,avail:"Very Rare",enc:1,notes:"10 min to alter appearance"},{name:"Entrenching Tool",cost:20,avail:"Common",enc:1,notes:"Counts as Improvised (One-handed) melee"},{name:"Filtration Plugs",cost:20,avail:"Common",enc:0,notes:"+2 SL Fortitude vs harmful gases"},{name:"Glow-Globe/Stablight",cost:30,avail:"Common",enc:0,notes:"Removes Poorly Lit + Dark from Zone. 5hr runtime"},{name:"Grapnel Launcher",cost:550,avail:"Common",enc:0,notes:"50m reach; lifts 2 Medium creatures"},{name:"Grav Chute",cost:2000,avail:"Rare",enc:2,notes:"Ignore fall damage 10 min"},{name:"Holy Icon",cost:10,avail:"Common",enc:0,notes:"+1 SL Discipline (Fear) Tests"},{name:"Lascutter",cost:170,avail:"Common",enc:2,notes:"Tech Tests to cut through solid objects"},{name:"Laud Hailer",cost:100,avail:"Scarce",enc:1,notes:"Voice audible up to 100m"},{name:"Mag Boots",cost:400,avail:"Rare",enc:0,notes:"Stick to ferromagnetic surfaces; ignore zero-G"},{name:"Manacles",cost:15,avail:"Common",enc:0,notes:"Restrains prisoners"},{name:"Multikey",cost:250,avail:"Scarce",enc:0,notes:"+20 to Dexterity (Lockpicking) Tests"},{name:"Photo-Visors",cost:300,avail:"Scarce",enc:0,notes:"Ignore Poorly Lit and Dark penalties"},{name:"Pict Recorder",cost:75,avail:"Common",enc:1,notes:"Records visual data; holds 100hrs footage"},{name:"Rebreather",cost:200,avail:"Scarce",enc:1,notes:"Ignore toxic/deadly air; breathe underwater. 1hr"},{name:"Respirator/Gas Mask",cost:50,avail:"Common",enc:0,notes:"Auto-pass Tests vs airborne pathogens"},{name:"Signal Jammer",cost:500,avail:"Rare",enc:1,notes:"Blocks vox in zone; Tech Test to set up"},{name:"Survival Gear",cost:50,avail:"Common",enc:3,notes:"Bedroll, tent, canteen, rope, firestarters"},{name:"Synskin",cost:3000,avail:"Exotic",enc:0,notes:"= Armoured Bodyglove (Subtle); +1 SL Stealth if worn alone"},{name:"Vox Bead",cost:50,avail:"Common",enc:0,notes:"Short-range encrypted vox communication"}]};

let _activeSection='WEAPONS';
let _armourDest='list';

function availClass(a){if(!a)return'';const l=a.toLowerCase();if(l==='common')return'avail-common';if(l==='scarce')return'avail-scarce';if(l==='rare')return'avail-rare';return'avail-exotic';}

function openArmoury(section){
  _activeSection=section;_armourDest='list';
  const titles={WEAPONS:'ADD WEAPON',ARMOUR:'ADD ARMOUR',GEAR:'ADD EQUIPMENT',AUGMETICS:'ADD AUGMETIC'};
  document.getElementById('armoury-title').textContent=titles[section]||'ARMOURY';
  const destRow=document.getElementById('armour-dest-row');
  destRow.style.display=(section==='ARMOUR')?'flex':'none';
  document.getElementById('dest-list').classList.add('selected');
  document.getElementById('dest-values').classList.remove('selected');
  document.getElementById('armoury-search').value='';
  document.getElementById('armoury-overlay').classList.add('open');
  renderList();
}

function closeArmoury(){document.getElementById('armoury-overlay').classList.remove('open');}

document.getElementById('armoury-overlay').addEventListener('click',function(e){if(e.target===this)closeArmoury();});

function setDest(dest,btn){
  _armourDest=dest;
  document.getElementById('dest-list').classList.toggle('selected',dest==='list');
  document.getElementById('dest-values').classList.toggle('selected',dest==='values');
}

function renderList(){
  const search=(document.getElementById('armoury-search').value||'').toLowerCase();
  const list=document.getElementById('armoury-item-list');
  list.innerHTML='';
  const catMap={WEAPONS:['MELEE','RANGED','GRENADES'],ARMOUR:['ARMOUR'],GEAR:['GEAR'],AUGMETICS:['AUGMETICS']};
  const cats=catMap[_activeSection]||[];
  cats.forEach(cat=>{
    const items=(ARMOURY[cat]||[]).filter(item=>!search||item.name.toLowerCase().includes(search));
    if(!items.length)return;
    if(cats.length>1){const s=document.createElement('div');s.className='armoury-subcat';s.textContent=cat;list.appendChild(s);}
    items.forEach(item=>{
      const row=document.createElement('div');row.className='armoury-item-row';row.onclick=()=>addItem(cat,item);
      const nameEl=document.createElement('div');nameEl.className='item-row-name';nameEl.textContent=item.name;
      const statsEl=document.createElement('div');statsEl.className='item-row-stats';
      let s='';
      if(cat==='MELEE'){s='<b>'+item.dam+'</b> dmg &nbsp; <b>'+item.spec+'</b> &nbsp; Enc <b>'+item.enc+'</b>';if(item.traits&&item.traits!=='\u2014')s+='<br>'+item.traits;}
      else if(cat==='RANGED'){s='<b>'+item.dam+'</b> dmg &nbsp; <b>'+item.range+'</b> &nbsp; Mag <b>'+item.mag+'</b> &nbsp; Enc <b>'+item.enc+'</b>';if(item.traits&&item.traits!=='\u2014')s+='<br>'+item.traits;}
      else if(cat==='GRENADES'){s='<b>'+item.dam+'</b> dmg &nbsp; <b>'+item.spec+'</b> &nbsp; Enc <b>'+item.enc+'</b>';if(item.traits)s+='<br>'+item.traits;}
      else if(cat==='ARMOUR'){s='AP <b>'+item.armour+'</b> &nbsp; '+item.locations+' &nbsp; Enc <b>'+item.enc+'</b>';if(item.traits&&item.traits!=='\u2014')s+=' &nbsp; '+item.traits;}
      else if(cat==='AUGMETICS'){s=item.effect||'';}
      else{s=item.notes||'';if(item.enc!==undefined)s+=' &nbsp; Enc <b>'+item.enc+'</b>';}
      s+=' &nbsp;<span class="item-cost-ref">'+item.cost+' sol.</span>';
      statsEl.innerHTML=s;
      const availEl=document.createElement('div');availEl.className='item-row-avail '+availClass(item.avail);availEl.textContent=item.avail;
      row.appendChild(nameEl);row.appendChild(statsEl);row.appendChild(availEl);list.appendChild(row);
    });
  });
  if(!list.children.length)list.innerHTML='<div style="padding:16px 14px;font-size:11px;color:var(--green-dark);letter-spacing:1px;">NO ITEMS FOUND</div>';
}

function addItem(cat,item){
  const d=currentData();
  if(cat==='MELEE'){if(!d.weapons)d.weapons=[];d.weapons.push({name:item.name,type:'Melee/'+item.spec,damage:item.dam,range:'Melee',clip:'\u2014',enc:String(item.enc),traits:item.traits,notes:''});saveCurrentData(d);renderWeapons(d);panelFlash('flash-weapons',item.name+' added');}
  else if(cat==='RANGED'){if(!d.weapons)d.weapons=[];d.weapons.push({name:item.name,type:'Ranged/'+item.spec,damage:item.dam,range:item.range,clip:String(item.mag),enc:String(item.enc),traits:item.traits,notes:''});saveCurrentData(d);renderWeapons(d);panelFlash('flash-weapons',item.name+' added');}
  else if(cat==='GRENADES'){if(!d.weapons)d.weapons=[];d.weapons.push({name:item.name,type:'Grenade/'+item.spec,damage:item.dam,range:'Thrown',clip:'1',enc:String(item.enc),traits:item.traits,notes:''});saveCurrentData(d);renderWeapons(d);panelFlash('flash-weapons',item.name+' added');}
  else if(cat==='ARMOUR'){
    if(_armourDest==='values'){
      if(!d.armour)d.armour={};
      const val=typeof item.armour==='number'?item.armour:0;
      const locs=(item.locations||'').toLowerCase();
      if(locs==='all'){['head','body','larm','rarm','lleg','rleg'].forEach(l=>{d.armour[l]=val;});}
      else{if(locs.includes('head'))d.armour.head=val;if(locs.includes('body'))d.armour.body=val;if(locs.includes('arm')||locs.includes('arms')){d.armour.larm=val;d.armour.rarm=val;}if(locs.includes('leg')||locs.includes('legs')){d.armour.lleg=val;d.armour.rleg=val;}}
      saveCurrentData(d);loadArmour(d);panelFlash('flash-armour',item.name+' applied to armour values');
    }else{if(!d.equipment)d.equipment=[];d.equipment.push(item.name+' (AP '+item.armour+', '+item.locations+')');saveCurrentData(d);renderEquip(d);panelFlash('flash-armour',item.name+' added to equipment');}
  }
  else if(cat==='AUGMETICS'){if(!d.augmetics)d.augmetics=[];d.augmetics.push(item.name+': '+item.effect);saveCurrentData(d);renderAugmetics(d);panelFlash('flash-aug',item.name+' added');}
  else{if(!d.equipment)d.equipment=[];d.equipment.push(item.name);saveCurrentData(d);renderEquip(d);panelFlash('flash-equip',item.name+' added');}
  closeArmoury();
}

function panelFlash(id,msg){const el=document.getElementById(id);if(!el)return;el.textContent='+ '+msg;el.classList.add('visible');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('visible'),2500);}

function renderWeapons(d){
  const tbody=document.getElementById('weapons-body');tbody.innerHTML='';
  (d.weapons||[]).forEach((w,i)=>{
    const tr=document.createElement('tr');
    ['name','type','damage','range','clip','enc','traits','notes'].forEach(f=>{const td=document.createElement('td');const inp=document.createElement('input');inp.type='text';inp.value=w[f]||'';inp.oninput=()=>updateWeapon(i,f,inp.value);td.appendChild(inp);tr.appendChild(td);});
    const td=document.createElement('td');const rm=document.createElement('button');rm.className='remove-btn';rm.innerHTML='&#x2715;';rm.onclick=()=>removeWeapon(i);td.appendChild(rm);tr.appendChild(td);tbody.appendChild(tr);
  });
}
function removeWeapon(i){const d=currentData();d.weapons.splice(i,1);saveCurrentData(d);renderWeapons(d);}
function updateWeapon(i,f,v){const d=currentData();d.weapons[i][f]=v;saveCurrentData(d);}
function renderEquip(d){renderSimpleList('equip-list',d.equipment||[],'equip');}
function renderAugmetics(d){renderSimpleList('augmetic-list',d.augmetics||[],'augmetic');}
function renderSimpleList(containerId,items,type){
  const list=document.getElementById(containerId);list.innerHTML='';
  items.forEach((item,i)=>{const div=document.createElement('div');div.className='list-item';const inp=document.createElement('input');inp.type='text';inp.value=item||'';inp.placeholder='Item...';inp.oninput=()=>updateSimpleItem(type,i,inp.value);const rm=document.createElement('button');rm.className='remove-btn';rm.innerHTML='&#x2715;';rm.onclick=()=>removeSimpleItem(type,i);div.appendChild(inp);div.appendChild(rm);list.appendChild(div);});
}
function removeSimpleItem(type,i){const d=currentData();const key=type==='equip'?'equipment':'augmetics';d[key].splice(i,1);saveCurrentData(d);if(type==='equip')renderEquip(d);else renderAugmetics(d);}
function updateSimpleItem(type,i,val){const d=currentData();const key=type==='equip'?'equipment':'augmetics';d[key][i]=val;saveCurrentData(d);}
function loadArmour(d){['head','body','larm','rarm','lleg','rleg'].forEach(loc=>{setVal('arm-'+loc,(d.armour||{})[loc]||0);});}
function init(){const d=currentData();setVal('v-solars',d.vitals?.solars??0);loadArmour(d);renderWeapons(d);renderEquip(d);renderAugmetics(d);}
window.refreshIfPresent=init;
init();
</script>
