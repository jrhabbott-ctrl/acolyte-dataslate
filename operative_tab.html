<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPERATIVE DATASLATE</title>
<script src="cs_shared.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

/* ── SUB-TAB BAR ── */
.sub-tabs {
  display: flex;
  border-bottom: 1px solid var(--green-mid);
  background: var(--black);
  flex-wrap: wrap;
}
.sub-tab {
  font-family: 'VT323', monospace;
  font-size: 17px;
  padding: 6px 18px;
  cursor: pointer;
  color: var(--green-dim);
  border: none;
  background: none;
  border-right: 1px solid var(--green-mid);
  letter-spacing: 1px;
  transition: color 0.1s, background 0.1s;
  white-space: nowrap;
}
.sub-tab:hover  { color: var(--green); background: var(--green-dark); }
.sub-tab.active { color: var(--green-bright); background: var(--green-dark); border-bottom: 2px solid var(--green); }

/* ── IFRAME ── */
#subtab-frame {
  width: 100%;
  border: none;
  display: block;
  min-height: 400px;
}

/* ── SYNC BAR ── */
.sync-bar {
  display: flex;
  gap: 6px;
  align-items: center;
  padding: 5px 10px;
  background: var(--green-faint);
  border-bottom: 1px solid var(--green-mid);
  flex-wrap: wrap;
}
.sync-bar input {
  flex: 1;
  min-width: 120px;
  max-width: 240px;
  font-size: 11px;
}
.sync-btn {
  font-family: 'VT323', monospace;
  font-size: 15px;
  padding: 3px 10px;
  background: none;
  border: none;
  color: var(--green-dim);
  cursor: pointer;
  letter-spacing: 1px;
  white-space: nowrap;
  transition: color 0.1s, text-shadow 0.1s;
}
.sync-btn::before { content: '[ '; color: var(--green-dark); }
.sync-btn::after  { content: ' ]'; color: var(--green-dark); }
.sync-btn:hover { color: var(--green); text-shadow: 0 0 8px var(--green-dim); }
.sync-btn:hover::before, .sync-btn:hover::after { color: var(--green-mid); }
.sync-status { font-size: 10px; color: var(--green-dim); }
.sync-status.ok  { color: var(--green); }
.sync-status.err { color: var(--red); }

/* ── HEADER GRID (identity + vitals) ── */
.header-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
  background: var(--green-faint);
  border-bottom: 1px solid var(--green-mid);
}
@media (max-width: 768px) { .header-grid { grid-template-columns: 1fr; } }

/* ── VITALS ── */
.vitals-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
}
@media (max-width: 600px) { .vitals-grid { grid-template-columns: repeat(2, 1fr); } }

.vital-block {
  border: 1px solid var(--green-mid);
  background: var(--black);
  padding: 5px;
  text-align: center;
}
.vital-name {
  font-size: 9px;
  color: var(--green-dim);
  letter-spacing: 1px;
  margin-bottom: 3px;
}
.vital-inputs {
  display: flex;
  align-items: center;
  gap: 3px;
  justify-content: center;
}
.vital-inputs input {
  width: 38px;
  text-align: center;
  font-size: 14px;
  padding: 2px;
  border: 1px solid var(--green-mid);
  background: var(--black);
  color: var(--green);
  font-family: 'VT323', monospace;
  outline: none;
}
.vital-inputs input:focus { border-color: var(--green); }
.vital-sep  { color: var(--green-dim); font-size: 11px; }
.vital-auto {
  font-family: 'VT323', monospace;
  font-size: 20px;
  color: var(--green);
}
.vital-wide input { width: 60px; }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--black);
  border: 1px solid var(--green);
  max-width: 480px;
  width: 95%;
  max-height: 80vh;
  overflow-y: auto;
}
.modal-header {
  font-family: 'VT323', monospace;
  font-size: 20px;
  padding: 8px 12px;
  background: var(--green-dark);
  border-bottom: 1px solid var(--green-mid);
  color: var(--green-bright);
  display: flex;
  justify-content: space-between;
  align-items: center;
  letter-spacing: 2px;
}
.modal-close {
  background: none; border: none;
  color: var(--green-dark); cursor: pointer;
  font-size: 18px; font-family: 'VT323', monospace;
  transition: color 0.1s, text-shadow 0.1s;
}
.modal-close:hover { color: var(--red); text-shadow: 0 0 6px var(--red-dim); }
.modal-body { padding: 12px; font-size: 13px; line-height: 1.6; }
.rename-form { display: flex; gap: 6px; padding: 10px; }

.warn-critical { color: var(--red) !important; }

</style>
</head>
<body>

<!-- ── SYNC BAR ── -->
<div class="sync-bar">
  <span class="text-dim font-vt" style="font-size:14px;">SYNC:</span>
  <input type="text" id="sb-url" placeholder="Supabase URL" oninput="saveSyncConfig()">
  <input type="text" id="sb-key" placeholder="Anon Key"     oninput="saveSyncConfig()">
  <button class="sync-btn" onclick="syncToGM()">&#11014; SYNC TO GM</button>
  <span class="sync-status" id="sync-status">&#8212;</span>
</div>

<!-- ── STATIC HEADER ── -->
<div class="header-grid">

  <!-- IDENTITY -->
  <div class="panel">
    <div class="panel-header">// IDENTITY</div>
    <div class="panel-body">
      <div class="field-row cols-2">
        <div class="field"><label>DESIGNATION</label>
          <input type="text" id="f-name"
            oninput="saveField('name',this.value)"></div>
        <div class="field"><label>ORIGIN</label>
          <input type="text" id="f-origin"
            oninput="saveField('origin',this.value)"></div>
      </div>
      <div class="field-row cols-2">
        <div class="field"><label>FACTION</label>
          <input type="text" id="f-faction"
            oninput="saveField('faction',this.value)"></div>
        <div class="field"><label>ROLE</label>
          <input type="text" id="f-role"
            oninput="saveField('role',this.value)"></div>
      </div>
      <div class="field-row cols-4">
        <div class="field"><label>AGE</label>
          <input type="text" id="f-age"
            oninput="saveField('age',this.value)"></div>
        <div class="field"><label>GENDER</label>
          <input type="text" id="f-gender"
            oninput="saveField('gender',this.value)"></div>
        <div class="field"><label>BUILD</label>
          <input type="text" id="f-build"
            oninput="saveField('build',this.value)"></div>
        <div class="field"><label>HAND</label>
          <select id="f-hand" onchange="saveField('hand',this.value)">
            <option value="R">RIGHT</option>
            <option value="L">LEFT</option>
          </select>
        </div>
      </div>
      <div class="field-row cols-2">
        <div class="field"><label>TOTAL XP</label>
          <input type="number" id="f-xp" min="0"
            oninput="saveField('xp',parseInt(this.value)||0);refreshXP()"></div>
        <div class="field"><label>AVAILABLE XP</label>
          <div class="vital-auto" id="xp-avail-display"
            style="font-size:18px;padding:3px 0;">&#8212;</div>
        </div>
      </div>
    </div>
  </div>

  <!-- VITAL STATISTICS -->
  <div class="panel">
    <div class="panel-header">// VITAL STATISTICS</div>
    <div class="panel-body">
      <div class="vitals-grid">

        <div class="vital-block">
          <div class="vital-name">WOUNDS</div>
          <div class="vital-inputs">
            <input type="number" id="v-wounds-cur" min="0"
              oninput="saveVital('wounds_cur',this.value)">
            <span class="vital-sep">/</span>
            <span class="vital-auto" id="v-wounds-max">&#8212;</span>
          </div>
        </div>

        <div class="vital-block">
          <div class="vital-name">CRITICAL WOUNDS</div>
          <div class="vital-inputs">
            <input type="number" id="v-crit-cur" min="0"
              oninput="saveVital('crit_cur',this.value);checkCritWarn()">
            <span class="vital-sep">/</span>
            <span class="vital-auto" id="v-crit-max">&#8212;</span>
          </div>
        </div>

        <div class="vital-block">
          <div class="vital-name">FATE</div>
          <div class="vital-inputs">
            <input type="number" id="v-fate-cur" min="0"
              oninput="saveVital('fate_cur',this.value)">
            <span class="vital-sep">/</span>
            <input type="number" id="v-fate-max" min="0"
              oninput="saveVital('fate_max',this.value)">
          </div>
        </div>

        <div class="vital-block">
          <div class="vital-name">CORRUPTION</div>
          <div class="vital-inputs vital-wide">
            <input type="number" id="v-corruption" min="0" max="100"
              oninput="saveVital('corruption',this.value)">
          </div>
        </div>

        <div class="vital-block">
          <div class="vital-name">INITIATIVE</div>
          <div class="vital-auto" id="v-initiative">&#8212;</div>
        </div>

        <div class="vital-block">
          <div class="vital-name">SPEED</div>
          <select id="v-speed" onchange="saveVital('speed',this.value)"
            style="font-size:11px;padding:2px;width:100%;background:var(--black);border:1px solid var(--green-mid);color:var(--green);font-family:'Share Tech Mono',monospace;outline:none;">
            <option value="Slow">SLOW</option>
            <option value="Normal" selected>NORMAL</option>
            <option value="Fast">FAST</option>
          </select>
        </div>

        <div class="vital-block">
          <div class="vital-name">ENCUMBRANCE</div>
          <div class="vital-inputs">
            <input type="number" id="v-enc-cur" min="0"
              oninput="saveVital('enc_cur',this.value)">
            <span class="vital-sep">/</span>
            <span class="vital-auto" id="v-enc-max">&#8212;</span>
          </div>
        </div>

        <div class="vital-block">
          <div class="vital-name">SOLARS</div>
          <div class="vital-inputs vital-wide">
            <input type="number" id="v-solars" min="0"
              oninput="saveVital('solars',this.value)">
          </div>
        </div>

      </div><!-- /vitals-grid -->

      <!-- Superiority -->
      <div style="margin-top:6px;padding:5px;border:1px solid var(--green-mid);background:var(--black);">
        <span class="text-dim" style="font-size:10px;letter-spacing:1px;">GROUP SUPERIORITY</span>
        <span style="font-size:9px;color:var(--green-dim);"> &#8212; shared resource</span>
        <div class="flex-row mt-6">
          <button class="inf-btn" onclick="adjSup(-1)">&#9666;</button>
          <span class="font-vt fs-big" id="v-sup">0</span>
          <button class="inf-btn" onclick="adjSup(1)">&#9656;</button>
          <span style="font-size:9px;color:var(--green-dim);margin-left:6px;">+1 SL on any Test (declare before roll)</span>
        </div>
      </div>

    </div>
  </div>

</div><!-- /header-grid -->

<!-- ── SUB-TAB BAR ── -->
<div class="sub-tabs">
  <button class="sub-tab active"
    onclick="switchTab('cs_characteristics.html',this)">CHARACTERISTICS</button>
  <button class="sub-tab"
    onclick="switchTab('cs_inventory.html',this)">INVENTORY</button>
  <button class="sub-tab"
    onclick="switchTab('cs_psychic.html',this)">PSYCHIC</button>
  <button class="sub-tab"
    onclick="switchTab('cs_info.html',this)">INFO</button>
  <button class="sub-tab"
    onclick="switchTab('cs_tools.html',this)">TOOLS</button>
</div>

<!-- ── SUB-TAB IFRAME ── -->
<iframe id="subtab-frame" src="cs_characteristics.html" scrolling="no"></iframe>

<!-- ── RENAME MODAL ── -->
<div class="modal-overlay" id="modal-rename">
  <div class="modal">
    <div class="modal-header">
      <span>RENAME OPERATIVE</span>
      <button class="modal-close" onclick="closeModal('modal-rename')">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="rename-form">
        <input type="text" id="rename-input" placeholder="Enter designation..."
          style="flex:1;">
        <button class="action-btn" onclick="confirmRename()">CONFIRM</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="import-file-input" accept=".json"
  style="display:none;" onchange="handleImport(event)">

<script>
// ============================================================
// SHELL JS  — identity/vitals only, no sheet rendering
// ============================================================

// Guard: catch cs_shared.js load failure early
if (!window.CS_SHARED_LOADED) {
  document.body.innerHTML = '<div style="color:#ff3300;font-family:monospace;padding:20px;">' +
    'ERROR: cs_shared.js failed to load. Ensure both files are in the same directory ' +
    'and served via HTTP (not file://).</div>';
  throw new Error('cs_shared.js not loaded');
}

const frame = document.getElementById('subtab-frame');

// ── Sub-tab switching ──────────────────────────────────────

function switchTab(src, btn) {
  document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  frame.src = src;
}

// Auto-resize iframe to its content height
frame.addEventListener('load', resizeFrame);
function resizeFrame() {
  try {
    const doc = frame.contentDocument || frame.contentWindow.document;
    frame.style.height = doc.documentElement.scrollHeight + 'px';
    // Re-check after images/fonts settle
    setTimeout(() => {
      try {
        frame.style.height = doc.documentElement.scrollHeight + 'px';
      } catch(e) {}
    }, 300);
  } catch(e) {
    frame.style.height = '800px';
  }
}

// ── Storage event: refresh header when sub-tab saves data ──
window.addEventListener('storage', e => {
  if (e.key && e.key.startsWith(LS_PREFIX)) loadHeader();
});

// ── Load header from active slot ──────────────────────────

function loadHeader() {
  const d = currentData();

  // Identity
  setVal('f-name',    d.name    || '');
  setVal('f-origin',  d.origin  || '');
  setVal('f-faction', d.faction || '');
  setVal('f-role',    d.role    || '');
  setVal('f-age',     d.age     || '');
  setVal('f-gender',  d.gender  || '');
  setVal('f-build',   d.build   || '');
  setVal('f-hand',    d.hand    || 'R');
  setVal('f-xp',      d.xp      || 0);

  // Vitals
  const v = d.vitals || {};
  setVal('v-wounds-cur', v.wounds_cur ?? 0);
  setVal('v-crit-cur',   v.crit_cur   ?? 0);
  setVal('v-fate-cur',   v.fate_cur   ?? 3);
  setVal('v-fate-max',   v.fate_max   ?? 3);
  setVal('v-corruption', v.corruption ?? 0);
  setVal('v-speed',      v.speed      || 'Normal');
  setVal('v-enc-cur',    v.enc_cur    ?? 0);
  setVal('v-solars',     v.solars     ?? 0);
  document.getElementById('v-sup').textContent = v.superiority ?? 0;

  // Derived stats (read-only displays)
  const ds = calcDerivedStats(d);
  document.getElementById('v-wounds-max').textContent = ds.wounds_max;
  document.getElementById('v-crit-max').textContent   = ds.crit_max;
  document.getElementById('v-initiative').textContent = ds.initiative;
  document.getElementById('v-enc-max').textContent    = ds.enc_max;

  refreshXP();
  checkCritWarn();

  // Sync config
  document.getElementById('sb-url').value =
    localStorage.getItem('dataslate_supabase_url') || '';
  document.getElementById('sb-key').value =
    localStorage.getItem('dataslate_supabase_key') || '';
}

function refreshXP() {
  const d = currentData();
  const avail = Math.max(0, (d.xp || 0) - calcSpentXP(d));
  document.getElementById('xp-avail-display').textContent = avail;
}

// ── Vitals helpers ─────────────────────────────────────────

function checkCritWarn() {
  const cur = Number(document.getElementById('v-crit-cur')?.value) || 0;
  const max = Number(document.getElementById('v-crit-max')?.textContent) || 0;
  const el  = document.getElementById('v-crit-cur');
  if (el) el.classList.toggle('warn-critical', max > 0 && cur >= max);
}

function adjSup(delta) {
  const d = currentData();
  if (!d.vitals) d.vitals = {};
  d.vitals.superiority = Math.max(0, (d.vitals.superiority || 0) + delta);
  saveCurrentData(d);
  document.getElementById('v-sup').textContent = d.vitals.superiority;
}

// ── Modals ─────────────────────────────────────────────────

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) closeModal(e.target.id);
});

function confirmRename() {
  const val = document.getElementById('rename-input').value.trim();
  const d = currentData();
  d.name = val;
  saveCurrentData(d);
  setVal('f-name', val);
  closeModal('modal-rename');
}

// ── Import (triggered from cs_tools.html via parent ref) ───

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      saveCurrentData(d);
      loadHeader();
      // Reload the active sub-tab to reflect new data
      frame.src = frame.src;
    } catch(err) { alert('Invalid JSON file.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── Supabase sync ──────────────────────────────────────────

function saveSyncConfig() {
  localStorage.setItem('dataslate_supabase_url',
    document.getElementById('sb-url').value);
  localStorage.setItem('dataslate_supabase_key',
    document.getElementById('sb-key').value);
}

async function syncToGM() {
  const url = document.getElementById('sb-url').value.trim();
  const key = document.getElementById('sb-key').value.trim();
  const statusEl = document.getElementById('sync-status');
  if (!url || !key) {
    statusEl.textContent = 'ERR: URL and key required';
    statusEl.className = 'sync-status err';
    return;
  }
  const d = currentData();
  statusEl.textContent = 'SYNCING...';
  statusEl.className = 'sync-status';
  try {
    const sb = supabase.createClient(url, key);
    const { error } = await sb.from('operative_sheets').upsert({
      slot_index:     currentSlot,
      operative_name: d.name || ('Operative ' + (currentSlot + 1)),
      sheet_data:     d,
      updated_at:     new Date().toISOString()
    }, { onConflict: 'slot_index' });
    if (error) throw error;
    statusEl.textContent = 'SYNCED ' + new Date().toTimeString().slice(0, 8);
    statusEl.className = 'sync-status ok';
  } catch(e) {
    statusEl.textContent = 'ERR: ' + (e.message || 'sync failed');
    statusEl.className = 'sync-status err';
  }
}

// ── Init ───────────────────────────────────────────────────

loadHeader();

</script>
</body>
</html>
